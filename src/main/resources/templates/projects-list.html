<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio Projects | Harsh Goyal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #4f46e5;
            --text-muted: #64748b;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: rgba(148, 163, 184, 0.25);
        }
        [data-theme="dark"] {
            --primary: #e5e7eb;
            --accent: #818cf8;
            --text-muted: #94a3b8;
            --bg: #020617;
            --surface: #111827;
            --border: rgba(148, 163, 184, 0.28);
        }
        body { font-family: 'Inter', sans-serif; color: var(--primary); background: var(--bg); line-height: 1.6; overflow-x: hidden; padding-top: 82px; }
        .section-padding { padding: 80px 0; }
        .project-card { background: var(--surface); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .project-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border-color: var(--accent); }
        .project-body { padding: 2rem; }
        .tech-pill { font-size: 0.75rem; background: #eff6ff; color: var(--accent); padding: 4px 12px; border-radius: 100px; font-weight: 600; margin-right: 8px; margin-bottom: 8px; display: inline-block; }
        [data-theme="dark"] .tech-pill { background: rgba(99, 102, 241, 0.2); }
        .text-muted { color: var(--text-muted) !important; }
        footer { padding: 4rem 0; border-top: 1px solid var(--border); }
        .social-link { color: var(--primary); }
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); z-index: 1000; transition: transform 0.3s; }
        .whatsapp-float:hover { transform: scale(1.1); color: white; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div th:replace="~{header :: navbar}"></div>

    <section class="section-padding">
        <div class="container">
            <h1 class="display-4 fw-bold text-center mb-5" data-aos="fade-up">Featured Projects</h1>
            <div class="row g-4">
                <div th:each="project : ${projects}" class="col-lg-6" data-aos="zoom-in">
                    <div class="project-card">
                        <div class="project-body">
                            <div class="mb-3">
                                <span class="tech-pill" th:each="tech : ${#strings.arraySplit(project.techStack, ',')}" th:text="${tech.trim()}">Tech</span>
                            </div>
                            <h4 class="fw-bold mb-3" th:text="${project.title}">Project Title</h4>
                            <p class="text-muted mb-4 small" th:text="${project.problemStatement}">Description.</p>
                            <div class="mb-4">
                                <p class="mb-1 fw-bold small text-primary">Key Features:</p>
                                <p class="small text-muted mb-0" th:text="${project.keyFeatures}"></p>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <a th:href="${project.githubLink}" class="fw-bold text-decoration-none small" style="color: var(--primary);" target="_blank">Source Code <i class="fab fa-github ms-1"></i></a>
                                <a th:href="${project.liveDemo}" class="btn btn-outline-primary btn-sm rounded-pill px-4">Live Demo</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="text-center py-5">
        <div class="container">
            <div class="mb-4">
                <a href="https://github.com/HarshGoyal7310" class="social-link mx-3" target="_blank"><i class="fab fa-github fa-xl"></i></a>
                <a href="https://linkedin.com/in/harshgoyal2002" class="social-link mx-3" target="_blank"><i class="fab fa-linkedin fa-xl"></i></a>
                <a href="mailto:harshgoyal7310@gmail.com" class="social-link mx-3"><i class="fas fa-envelope fa-xl"></i></a>
            </div>
            <p class="text-muted small mb-0">&copy; 2026 Harsh Goyal. All rights reserved.</p>
        </div>
    </footer>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/917310662063" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
