# MySQL Database Configuration
# Environment variables can be set in hosting provider dashboard
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/portfolio_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Admin Security Credentials
portfolio.admin.username=${ADMIN_USERNAME:admin}
portfolio.admin.password=${ADMIN_PASS:Harsh@7310}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server configuration
server.port=${PORT:8080}
